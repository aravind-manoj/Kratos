<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kratos — Live Scan</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      background: #09090b;
      color: #a1a1aa;
      min-height: 100vh;
    }
    header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid #27272a;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.75rem;
    }
    header h1 { font-size: 1rem; color: #fafafa; font-weight: 600; }
    .meta { font-size: 0.75rem; color: #71717a; }
    .badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 9999px;
      font-size: 0.65rem;
      text-transform: uppercase;
      font-weight: 600;
      border: 1px solid;
    }
    .badge-running { color: #60a5fa; border-color: #3b82f680; background: #3b82f610; }
    .badge-completed { color: #4ade80; border-color: #22c55e80; background: #22c55e10; }
    .badge-stopped { color: #fb923c; border-color: #f9731680; background: #f9731610; }
    .badge-starting { color: #facc15; border-color: #eab30880; background: #eab30810; }
    .badge-error { color: #f87171; border-color: #ef444480; background: #ef444410; }
    main { padding: 1rem 1.5rem; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(480px, 1fr));
      gap: 1rem;
    }
    .card {
      border: 1px solid #27272a;
      border-radius: 0.5rem;
      background: #18181b;
      overflow: hidden;
    }
    .card-header {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #27272a;
    }
    .card-header h2 { font-size: 0.8rem; color: #e4e4e7; margin-bottom: 0.25rem; }
    .card-header p { font-size: 0.7rem; color: #71717a; white-space: pre-wrap; }
    .card-body { padding: 0.75rem 1rem; }
    .steps, .findings { font-size: 0.7rem; margin-bottom: 0.5rem; }
    .steps li, .findings li { margin-left: 1rem; margin-bottom: 0.15rem; }
    .terminal-wrap {
      height: 16rem;
      padding: 0.5rem;
      background: #09090b;
      border-top: 1px solid #27272a;
    }
    .empty {
      text-align: center;
      padding: 3rem;
      color: #52525b;
      font-size: 0.85rem;
    }
    #connection {
      font-size: 0.7rem;
      color: #71717a;
    }
    #connection.connected { color: #4ade80; }
    #connection.disconnected { color: #f87171; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Kratos Live Dashboard</h1>
      <div class="meta" id="scan-meta">Connecting...</div>
    </div>
    <div>
      <span id="scan-status" class="badge badge-starting">—</span>
      <span id="connection" class="disconnected">disconnected</span>
    </div>
  </header>
  <main>
    <div id="grid" class="grid">
      <div class="empty" id="empty-state">Waiting for sub-agents...</div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
  <script>
    const grid = document.getElementById("grid");
    const emptyState = document.getElementById("empty-state");
    const scanMeta = document.getElementById("scan-meta");
    const scanStatus = document.getElementById("scan-status");
    const connectionEl = document.getElementById("connection");

    const terminals = {};
    const subagentData = {};

    function statusClass(status) {
      const s = (status || "").toLowerCase();
      if (s === "running") return "badge-running";
      if (s === "completed") return "badge-completed";
      if (s === "stopped") return "badge-stopped";
      if (s === "error") return "badge-error";
      return "badge-starting";
    }

    function updateScanHeader(scan) {
      if (!scan) return;
      const targets = (scan.targets || []).join(", ");
      scanMeta.textContent = `Targets: ${targets} | Vectors: ${(scan.vectors || []).join(", ")}`;
      scanStatus.textContent = scan.status || "unknown";
      scanStatus.className = "badge " + statusClass(scan.status);
    }

    function ensureTerminal(id) {
      if (terminals[id]) return terminals[id];
      const wrap = document.querySelector(`#term-${id}`);
      if (!wrap) return null;
      const term = new Terminal({
        theme: { background: "#09090b", foreground: "#a1a1aa", cursor: "transparent" },
        fontFamily: "monospace",
        fontSize: 11,
        cursorBlink: false,
        disableStdin: true,
      });
      const fit = new FitAddon.FitAddon();
      term.loadAddon(fit);
      term.open(wrap);
      fit.fit();
      terminals[id] = { term, fit };
      return terminals[id];
    }

    function renderSubagent(sub) {
      subagentData[sub.id] = { ...subagentData[sub.id], ...sub };
      const data = subagentData[sub.id];

      let card = document.getElementById(`card-${sub.id}`);
      if (!card) {
        if (emptyState) emptyState.style.display = "none";
        card = document.createElement("div");
        card.className = "card";
        card.id = `card-${sub.id}`;
        card.innerHTML = `
          <div class="card-header">
            <h2></h2>
            <p></p>
            <span class="badge badge-starting status-badge"></span>
          </div>
          <div class="card-body">
            <div class="steps"><strong>Steps:</strong><ul></ul></div>
            <div class="findings"><strong>Findings:</strong><ul></ul></div>
          </div>
          <div class="terminal-wrap"><div id="term-${sub.id}" style="width:100%;height:100%"></div></div>
        `;
        grid.appendChild(card);
      }

      card.querySelector("h2").textContent = sub.id;
      card.querySelector("p").textContent = sub.task || "";
      const badge = card.querySelector(".status-badge");
      badge.textContent = sub.status || "starting";
      badge.className = "badge status-badge " + statusClass(sub.status);

      const stepsUl = card.querySelector(".steps ul");
      stepsUl.innerHTML = (sub.completed_steps || []).map(s => `<li>${escapeHtml(s)}</li>`).join("") || "<li><em>None yet</em></li>";

      const findingsUl = card.querySelector(".findings ul");
      findingsUl.innerHTML = (sub.findings || []).map(f => `<li>${escapeHtml(f)}</li>`).join("") || "<li><em>None yet</em></li>";

      if (sub.buffer) {
        const t = ensureTerminal(sub.id);
        if (t) {
          t.term.clear();
          t.term.write(sub.buffer.replace(/\n/g, "\r\n"));
        }
      }
    }

    function escapeHtml(text) {
      const d = document.createElement("div");
      d.textContent = text;
      return d.innerHTML;
    }

    function handleEvent(msg) {
      if (msg.type === "snapshot") {
        if (msg.scan) updateScanHeader(msg.scan);
        (msg.subagents || []).forEach(renderSubagent);
      } else if (msg.type === "scan_update") {
        updateScanHeader(msg.scan);
      } else if (msg.type === "subagent_update") {
        renderSubagent(msg.subagent);
      } else if (msg.type === "terminal_update") {
        const sub = subagentData[msg.subagent_id] || { id: msg.subagent_id };
        sub.buffer = msg.buffer;
        renderSubagent(sub);
      }
    }

    function connect() {
      const proto = location.protocol === "https:" ? "wss:" : "ws:";
      const ws = new WebSocket(`${proto}//${location.host}/ws`);

      ws.onopen = () => {
        connectionEl.textContent = "connected";
        connectionEl.className = "connected";
      };

      ws.onclose = () => {
        connectionEl.textContent = "disconnected";
        connectionEl.className = "disconnected";
        setTimeout(connect, 2000);
      };

      ws.onmessage = (ev) => {
        try {
          handleEvent(JSON.parse(ev.data));
        } catch (e) {
          console.error(e);
        }
      };
    }

    connect();
    window.addEventListener("resize", () => {
      Object.values(terminals).forEach(({ fit }) => fit.fit());
    });
  </script>
</body>
</html>
