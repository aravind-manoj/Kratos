<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kratos — Live Scan</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      background: #09090b;
      color: #a1a1aa;
      min-height: 100vh;
    }

    header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid #27272a;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    header h1 {
      font-size: 1rem;
      color: #fafafa;
      font-weight: 600;
    }

    .meta {
      font-size: 0.75rem;
      color: #71717a;
    }

    .badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 9999px;
      font-size: 0.65rem;
      text-transform: uppercase;
      font-weight: 600;
      border: 1px solid;
    }

    .badge-running {
      color: #60a5fa;
      border-color: #3b82f680;
      background: #3b82f610;
    }

    .badge-completed {
      color: #4ade80;
      border-color: #22c55e80;
      background: #22c55e10;
    }

    .badge-stopped {
      color: #fb923c;
      border-color: #f9731680;
      background: #f9731610;
    }

    .badge-starting {
      color: #facc15;
      border-color: #eab30880;
      background: #eab30810;
    }

    .badge-error {
      color: #f87171;
      border-color: #ef444480;
      background: #ef444410;
    }

    main {
      padding: 1rem 1.5rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(480px, 1fr));
      gap: 1rem;
    }

    .card {
      border: 1px solid #27272a;
      border-radius: 0.5rem;
      background: #18181b;
      overflow: hidden;
    }

    .card-header {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #27272a;
    }

    .card-header h2 {
      font-size: 0.8rem;
      color: #e4e4e7;
      margin-bottom: 0.25rem;
    }

    .card-header p {
      font-size: 0.7rem;
      color: #71717a;
      white-space: pre-wrap;
    }

    .card-body {
      padding: 0.75rem 1rem;
    }

    .steps,
    .findings {
      font-size: 0.7rem;
      margin-bottom: 0.5rem;
    }

    .steps li,
    .findings li {
      margin-left: 1rem;
      margin-bottom: 0.15rem;
    }

    .terminal-wrap {
      height: 16rem;
      padding: 0.5rem;
      background: #09090b;
      border-top: 1px solid #27272a;
      overflow: hidden;
    }

    .terminal-output {
      margin: 0;
      height: 100%;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 11px;
      line-height: 1.4;
      color: #a1a1aa;
      background: #09090b;
    }

    .empty {
      text-align: center;
      padding: 3rem;
      color: #52525b;
      font-size: 0.85rem;
    }

    #connection {
      font-size: 0.7rem;
      color: #71717a;
    }

    #connection.connected {
      color: #4ade80;
    }

    #connection.connecting {
      color: #facc15;
    }

    #connection.disconnected {
      color: #f87171;
    }
  </style>
</head>

<body>
  <header>
    <div>
      <h1>Kratos Attack Dashboard</h1>
      <div class="meta" id="scan-meta">Waiting for scan data...</div>
    </div>
    <div>
      <span id="scan-status" class="badge badge-starting">—</span>
      <span id="connection" class="connecting">connecting</span>
    </div>
  </header>
  <main>
    <div id="grid" class="grid">
      <div class="empty" id="empty-state">Waiting for sub-agents...</div>
    </div>
  </main>

  <script>
    const grid = document.getElementById("grid");
    const emptyState = document.getElementById("empty-state");
    const scanMeta = document.getElementById("scan-meta");
    const scanStatus = document.getElementById("scan-status");
    const connectionEl = document.getElementById("connection");

    const subagentData = {};

    function statusClass(status) {
      const s = (status || "").toLowerCase();
      if (s === "running") return "badge-running";
      if (s === "completed") return "badge-completed";
      if (s === "stopped") return "badge-stopped";
      if (s === "error") return "badge-error";
      return "badge-starting";
    }

    function updateScanHeader(scan) {
      if (!scan) return;
      const targets = (scan.targets || []).join(", ");
      scanMeta.textContent = `Targets: ${targets} | Vectors: ${(scan.vectors || []).join(", ")}`;
      scanStatus.textContent = scan.status || "unknown";
      scanStatus.className = "badge " + statusClass(scan.status);
    }

    function sanitizeTerminalText(text) {
      return (text || "").replace(/[\x00-\x08\x0b-\x1f\x7f]/g, "");
    }

    function updateTerminal(id, buffer) {
      const el = document.getElementById(`term-${id}`);
      if (!el) return;
      const text = sanitizeTerminalText(buffer);
      if (el.dataset.lastBuffer === text) return;
      el.dataset.lastBuffer = text;
      el.textContent = text || "Waiting for container output...";
      el.scrollTop = el.scrollHeight;
    }

    function mergeSubagent(sub) {
      const prev = subagentData[sub.id] || {};
      const incoming = sub.buffer || "";
      const existing = prev.buffer || "";
      subagentData[sub.id] = {
        ...prev,
        ...sub,
        buffer: incoming.length >= existing.length ? incoming : existing,
      };
      return subagentData[sub.id];
    }

    function renderSubagentCard(sub) {
      const data = mergeSubagent(sub);

      let card = document.getElementById(`card-${sub.id}`);
      if (!card) {
        if (emptyState) emptyState.style.display = "none";
        card = document.createElement("div");
        card.className = "card";
        card.id = `card-${sub.id}`;
        card.innerHTML = `
          <div class="card-header">
            <h2></h2>
            <p></p>
            <span class="badge badge-starting status-badge"></span>
          </div>
          <div class="card-body">
            <div class="steps"><strong>Steps:</strong><ul></ul></div>
            <div class="findings"><strong>Findings:</strong><ul></ul></div>
          </div>
          <div class="terminal-wrap"><pre class="terminal-output" id="term-${sub.id}">Waiting for container output...</pre></div>
        `;
        grid.appendChild(card);
      }

      card.querySelector("h2").textContent = data.id;
      card.querySelector("p").textContent = data.task || "";
      const badge = card.querySelector(".status-badge");
      badge.textContent = data.status || "starting";
      badge.className = "badge status-badge " + statusClass(data.status);

      const stepsUl = card.querySelector(".steps ul");
      stepsUl.innerHTML = (data.completed_steps || []).map(s => `<li>${escapeHtml(s)}</li>`).join("") || "<li><em>None yet</em></li>";

      const findingsUl = card.querySelector(".findings ul");
      findingsUl.innerHTML = (data.findings || []).map(f => `<li>${escapeHtml(f)}</li>`).join("") || "<li><em>None yet</em></li>";

      updateTerminal(data.id, data.buffer);
    }

    function escapeHtml(text) {
      const d = document.createElement("div");
      d.textContent = text;
      return d.innerHTML;
    }

    function handleEvent(msg) {
      if (msg.type === "snapshot") {
        if (msg.scan) updateScanHeader(msg.scan);
        (msg.subagents || []).forEach(renderSubagentCard);
      } else if (msg.type === "scan_update") {
        updateScanHeader(msg.scan);
      } else if (msg.type === "subagent_update") {
        renderSubagentCard(msg.subagent);
      } else if (msg.type === "terminal_update") {
        const id = msg.subagent_id;
        const prev = subagentData[id] || { id, task: "", status: "running" };
        prev.buffer = msg.buffer;
        renderSubagentCard(prev);
      }
    }

    let reconnectTimer = null;
    let connectAttempt = 0;

    function setConnection(state) {
      connectionEl.textContent = state;
      connectionEl.className = state;
    }

    function scheduleReconnect() {
      if (reconnectTimer) clearTimeout(reconnectTimer);
      const delay = Math.min(300 * (2 ** connectAttempt), 3000);
      connectAttempt += 1;
      reconnectTimer = setTimeout(connect, delay);
    }

    function connect() {
      setConnection("connecting");

      const proto = location.protocol === "https:" ? "wss:" : "ws:";
      const ws = new WebSocket(`${proto}//${location.host}/ws`);
      let opened = false;

      const timeout = setTimeout(() => {
        if (!opened && ws.readyState !== WebSocket.OPEN) {
          ws.close();
          setConnection("disconnected");
          scheduleReconnect();
        }
      }, 5000);

      ws.onopen = () => {
        opened = true;
        connectAttempt = 0;
        clearTimeout(timeout);
        setConnection("connected");
      };

      ws.onclose = () => {
        clearTimeout(timeout);
        setConnection("disconnected");
        scheduleReconnect();
      };

      ws.onmessage = (ev) => {
        try {
          handleEvent(JSON.parse(ev.data));
        } catch (e) {
          console.error(e);
        }
      };
    }

    connect();
  </script>
</body>

</html>
